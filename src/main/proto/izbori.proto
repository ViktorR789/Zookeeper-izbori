syntax = "proto3";

option java_multiple_files = true;
option java_package = "rs.ac.fink.izbori.grpc";

package izbori;

service ElectionService {
  rpc SubmitVotes(VoteRequest) returns (VoteResponse);
  rpc GetStatistics(StatisticsRequest) returns (StatisticsResponse);
}

service ReplicatedLogService {
  rpc AppendLog(LogEntry) returns (LogResponse);
  rpc GetLeaderInfo(LeaderRequest) returns (LeaderInfo);
}

message VoteRequest {
  int32 controller_id = 1;
  int32 station_id = 2;
  int32 total_voted = 3;
  int32 invalid_votes = 4;
  map<string, int32> votes_per_candidate = 5;
}

enum VoteStatus {
  OK = 0;
  INVALID_SUM = 1;
  NOT_LEADER = 2;
  STATION_BLOCKED = 3;
  VERIFICATION_FAILED = 4;
  STATION_VERIFIED = 5;
  NEEDS_RETRY = 6;
}

message VoteResponse {
  VoteStatus status = 1;
  string message = 2;
  bool verified = 3;
}

message StatisticsRequest {}

message StatisticsResponse {
  double percentage_reported = 1;
  double turnout_percentage = 2;
  map<string, int32> results_per_candidate = 3;
  int32 stations_needing_retry = 4;
  int32 total_stations = 5;
  int32 verified_stations = 6;
}

message LogEntry {
  int64 entry_at_index = 1;
  bytes log_entry_data = 2;
}

enum LogStatus {
  LOG_OK = 0;
  LOG_HASNT_LAST_ENTRY = 1;
  IO_ERROR = 2;
}

message LogResponse {
  LogStatus status = 1;
  int64 entry_at_index = 2;
  int64 last_entry_index = 3;
}

message LeaderRequest {}

message LeaderInfo {
  bool im_leader = 1;
  string hostname_port = 2;
}